[project]
name = "data"
version = "0.1.0"
description = "On-chain / market data helpers (Phase 1 home)"
authors = [
    { name = "Jun Guo", email = "gjuoun@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "ccxt>=4.0",
    "jupyter>=1.0",
    "numpy>=2.0",
    "pandas>=2.2",
    "scikit-learn>=1.5",
    "statsmodels>=0.14",
]

[build-system]
requires = ["uv_build>=0.11.28,<0.12.0"]
build-backend = "uv_build"

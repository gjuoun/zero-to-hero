[project]
name = "data"
version = "0.1.0"
description = "On-chain / market data helpers (Phase 1 home)"
requires-python = ">=3.12"
dependencies = [
  "pandas>=2.2",
  "numpy>=2.0",
  "scikit-learn>=1.5",
  "statsmodels>=0.14",
  "jupyter>=1.0",
  "ccxt>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/data"]
